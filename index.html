
<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badinan Motivation</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0a192f 0%, #0f3460 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #8892b0;
            --accent-color: #64ffda;
            --accent-glow: rgba(100, 255, 218, 0.2);
            --premium-bg: rgba(254, 243, 199, 0.05);
            --premium-border: rgba(251, 191, 36, 0.3);
            --premium-text: #fde047;
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #e6f0fa 0%, #bcd4e6 100%);
            --card-bg: #ffffff;
            --card-border: #d1d5db;
            --text-main: #0a192f;
            --text-muted: #4b5563;
            --accent-color: #0f3460;
            --accent-glow: rgba(15, 52, 96, 0.1);
            --premium-bg: #fef3c7;
            --premium-border: #fbbf24;
            --premium-text: #b45309;
        }

        body { 
            font-family: 'Segoe UI', 'Tahoma', sans-serif; 
            background: var(--bg-gradient); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            transition: background 0.5s ease;
        }

        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 35px 25px; 
            border-radius: 32px; 
            border: 1px solid var(--card-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
            text-align: center; 
            max-width: 440px; 
            width: 100%; 
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .logo-area h1 { 
            color: var(--text-main); 
            font-size: 18px; 
            font-weight: 700;
            margin: 0; 
            letter-spacing: 0.5px;
        }

        .circle-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .circle-btn:hover {
            border-color: var(--accent-color);
            background: var(--accent-glow);
        }

        .clock-container {
            margin-bottom: 25px;
        }

        #clock { 
            font-size: 36px; 
            font-weight: 800; 
            color: var(--accent-color); 
            margin: 0;
            font-variant-numeric: tabular-nums;
        }

        #day-period {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 600;
        }

        .quote-box {
            min-height: 150px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }

        p#main-text { 
            color: var(--text-main); 
            font-size: 19px; 
            line-height: 1.8; 
            margin: 0;
            font-weight: 600;
        }

        .main-btn { 
            background-color: var(--accent-color); 
            color: #0a192f; 
            border: none; 
            padding: 16px; 
            border-radius: 16px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 16px;
            font-weight: 700;
            box-shadow: 0 4px 14px var(--accent-glow);
            transition: all 0.2s;
        }
        [data-theme="light"] .main-btn {
            color: white;
        }
        .main-btn:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        .notification-setting {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.1);
            padding: 15px;
            border-radius: 14px;
            border: 1px solid var(--card-border);
            text-align: right;
        }

        .notification-setting label {
            display: block;
            font-size: 13px;
            color: var(--text-main);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .notification-setting input[type="time"] {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            text-align: center;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .noti-btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: #0f3460;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .noti-btn:hover {
            opacity: 0.9;
        }

        .premium { 
            background: var(--premium-bg); 
            border: 1px solid var(--premium-border); 
            padding: 20px; 
            border-radius: 24px; 
            margin-top: 25px; 
            text-align: right;
            cursor: pointer;
        }

        .premium strong {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            color: var(--premium-text);
            margin-bottom: 12px;
        }

        .premium ul {
            margin: 0;
            padding-right: 20px;
            font-size: 13px;
            color: var(--text-main);
            line-height: 1.9;
        }
        .premium ul li {
            margin-bottom: 6px;
            list-style-type: square;
        }

        .footer-credits { 
            margin-top: 30px; 
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="top-bar">
            <div class="logo-area">
                <h1>Badinan Motivation</h1>
            </div>
            <button class="circle-btn" onclick="toggleTheme()">🌓</button>
        </div>

        <div class="clock-container">
            <div id="clock">00:00:00</div>
            <div id="day-period">بارکردن...</div>
        </div>

        <div class="quote-box">
            <p id="main-text">ئەڤرۆ ڕۆژا تە یە، پێنگاڤێ باڤێژە!</p>
        </div>

        <!-- ١- گۆتنەکا نوو ❌ هاتە گۆهڕین بۆ پەیڤێن هاندەر -->
        <button class="main-btn" onclick="getNewQuote()">پەیڤێن هاندەر</button>

        <div class="notification-setting">
            <!-- ٣- دیارکرنا دەمژمێرا ئاگەهداریان -->
            <label for="notif-time">🔔 دیارکرنا دەمژمێرا ئاگەهداریان:</label>
            <input type="time" id="notif-time">
            
            <!-- ٢- ئاگەهداری (allow) -->
            <button class="noti-btn" style="background:#2ecc71; margin-bottom:8px;" onclick="requestPermissionFirst()">ئاگەهداری (allow)</button>
            
            <!-- ٤- بۆ ئاگەهدارکرنێ دەمی توماربکە -->
            <button class="noti-btn" onclick="saveNotificationTime()">بۆ ئاگەهدارکرنێ دەمی توماربکە</button>
        </div>

        <!-- ٥- دەمێ کەسەک کلیک دکەت بلا لسەر بهێت نڤیسین (ئەڤ بەشە د جێبەجێکرنێ دا یە) -->
        <div class="premium" onclick="alert('ئەڤ بەشە د جێبەجێکرنێ دا یە')">
            <strong>
                <span>✨ ئەڤ بەشە بۆ ئەندامێن پرێمیۆمە</span>
                <span>🔒</span>
            </strong>
            <ul>
                <li>بابەتێن پەیوەندیا ژەهراوی</li>
                <li>ڕاوەستان هەمبەر فشارێن جڤاکی</li>
                <li>خراب بکارئینانا سۆشیال میدیایێ</li>
            </ul>
        </div>

        <div class="footer-credits">
            Created by: <b>Huda Shahin sindi</b><br>
            هەمی ماف پاراستینە © 2026
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('clock').textContent = `${String(hours).padStart(2, '0')}:${minutes}:${seconds}`;
            
            let period = "";
            if (hours >= 5 && hours < 12) {
                period = "🌅 دەمێ سپێدەهیێ یە";
            } else if (hours >= 12 && hours < 16) {
                period = "☀️ دەمێ نیڤڕۆیە";
            } else if (hours >= 16 && hours < 19) {
                period = "🌇 دەمێ ئێڤاری یە";
            } else {
                period = "🌙 دەمێ شەڤێ یە";
            }
            document.getElementById('day-period').textContent = period;
        }
        setInterval(updateClock, 1000);
        updateClock();

        const quotes = [
            "ئەڤرۆ ڕۆژا تە یە، پێنگاڤێ باڤێژە!",
            "تو گەلەک ژ هندێ ب هێزتری تو دەستا ب داهێلی.",
            "بخۆ بژی، نە بۆ ڕازیکرنا خەڵکی.",
            "هەر نوکە دەست پێ بکە، چ جاران درەنگ نینە.",
            "تو یا ب هێزی، باوەریێ ب شیانێن خۆ بینە.",
            "ئەڤرۆ دەرفەتەکا نووی یە بۆ هندێ تو بگەهیە حەزێن خۆ.",
            "خەونێن تە مەزنن، هەولدانێن خۆ ژی مەزنتر لێ بکە.",
            "تو داهێنەرا ژیانا خۆیی، جوان ڕەنگ بکە.",
            "هەر تشتەکێ ئەڤرۆ دکەی، سوبە دێ پێ کەیفخۆش بی.",
            "تو ب تنێ دشێی ژیانا خۆ بگۆهۆڕی، دەست پێ بکە.",
            "ئارام بە، خودێ دێ دەرگەهێن خێڕێ بۆ تە ڤەکەت.",
            "پێنگاڤەکا بچووک باشترە ژ ڕاوەستانێ.",
            "تو ژ هەژی باشترین تشتی د ژیانێ دا.",
            "دەست ژ هیڤیێن خۆ بەرنەدە، تو کەسەک خودان شیانی.",
            "ئەڤرۆ کار بکە، دا کو سوبە شانازیێ ب خۆ بەی.",
            "ترسێ ژ دلێ خۆ دەر بێخە و بەرەف پێش هەرە.",
            "ماندیبوونا ئەڤرۆ، دێ بیتە کەیفخۆشیا سوبەهی.",
            "کەسەک نینە شوینا تە شەڕی بۆ خەونێن تە بکەت.",
            "بڕیارێ بدە و چو جاران سستیێ تێدا نەکە.",
            "هەر دەمەکێ تو تێدا دژی، دەمەکێ زێڕینە.",
            "ژ دەستپێکرنا نوو نەترسە، ئەڤە دەرفەتا تە یە.",
            "ئەڤرۆ یا پڕە ژ وزە و هێزێ، بکاربینە!",
            "تو یا بڕیاردەری، چو هێز نەشێن تە ڕاگرن.",
            "هەول بدە ئەڤرۆ باشتر بی ژ دوهی.",
            "سەبر کلیلا هەر دەرگەهەکەکێ داخستی یە.",
            "ب دڵسۆزی کار بکە، ئەنجام دێ تە مەندەهوش کەن.",
            "تو یا تایبەتی، چو کەس وەک تە نین.",
            "ژیان یا کورتە، ب کەیف و سەرکەفتن دەرباز بکە.",
            "سەرکەفتن ناهێت، پێدڤییە تو بۆ بچی.",
            "خودێ دگەل تە یە، چ خەمان نەخۆ.",
            "تو خودان ئیرادەیەکا بهێزی.",
            "بێدەنگ کار بکە، بهێڵە دەنگێ سەرکەفتنا تە بڵند ببیت.",
            "هەر ڕۆژەکا نوو، شانسەک نوو یە بۆ سەرکەفتنێ.",
            "پاشەڕۆژ یا وان کەسانە یێن باوەری ب خەونێن خۆ هەی.",
            "ئارمانجێن مەزن قوربانیێن مەزن دڤێن.",
            "تو ژ وێ ب هێزتری یا دیار دکەی.",
            "ئارمانج بێ پلان، تنێ خەونەکە.",
            "بچووکترین پێنگاڤ ژی باشترە ژ جهەکێ دیار.",
            "کەسێ نەکە خودانێ بریارێن خۆ؛ ژیانا تە یا تە یە و کەس ماف نینە تێک بدەت.",
            "تو نە مەجبووری کەسەکێ ژ خۆ ڕازیکەی، گرنگ ئەوە تو ژ خۆ ڕازی بی و ئەڤە بەسە.",
            "هندەک جار دوورکەفتنا ژ خەلکی، مەزنترین دیارییە تو ددەیه‌ گیانێ خۆ.",
            "تو گەلەک ژ هندێ بهاتری کو دەمێ خۆ بۆ کەسێن بێ مفا تەرخان بکەی.",
            "تشتێ هەر گرنگ ل ڤێ جیهانێ، ئارامیا مێشکێ تە یە؛ هەر تشتێ وی تێک بدەت، ژێ دوور بکەڤە.",
            "کەسێن نەرێنی تنێ دڤێن هێزا تە ببڕن؛ نەهێلە ئارامیا ڕۆژا تە تێک بدەن.",
            "هەر دەمێ تو هەول ددەی هەمی کەسی ڕازی بکەی، وی دەمی تو یێ خۆ ژ دەست ددەی.",
            "دوورکەفتنا ژ کەسێن نەرێنی، نیڤا سەرکەفتن و ئارامیا تە یە.",
            "خەونێن تە ژ ڕایێن خەلکی گرانبەها ترن؛ لدووڤ دەنگێ دلێ خوە هەرە نەک بۆچونا خەلکی.",
            "گۆتنا \"نەخێر\" بۆ هەر ژینگەهەکا کو ڕەخنەیێن نەدرۆست ل تە بگرن.",
            "دانانا سنورێن توند دگەل دەوروبەرێن نەرێنی بۆ هندێ ڕۆژا تە ب کەیف دەرباز ببێت."
        ];

        function getNewQuote() {
            const textElement = document.getElementById('main-text');
            const randomIndex = Math.floor(Math.random() * quotes.length);
            textElement.textContent = quotes[randomIndex];
        }

        /* ٢- پەیاما سپی هاتە گۆهڕین بۆ هیڤیە سایتی بکە د Home Screen دا بو ئاگەهدارکرنێ */
        function requestPermissionFirst() {
            if ("Notification" in window) {
                Notification.requestPermission().then(permission => {
                    alert("هیڤیە سایتی بکە د Home Screen دا بو ئاگەهدارکرنێ");
                });
            } else {
                alert("هیڤیە سایتی بکە د Home Screen دا بو ئاگەهدارکرنێ");
            }
        }

        let alarmInterval = null;

        function saveNotificationTime() {
            const timeInput = document.getElementById("notif-time").value;
            if (!timeInput) {
                alert("هیڤیە دەمەکێ هەلبژێرە!");
                return;
            }

            alert("هیڤیە سایتی بکە د Home Screen دا بو ئاگەهدارکرنێ");

            if (alarmInterval) clearInterval(alarmInterval);

            alarmInterval = setInterval(() => {
                const now = new Date();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const currentTime = `${hours}:${minutes}`;

                if (currentTime === timeInput) {
                    const randomIndex = Math.floor(Math.random() * quotes.length);
                    new Notification("Badinan Motivation ✨", {
                        body: quotes[randomIndex]
                    });
                }
            }, 60000);
        }

        function toggleTheme() {
            if (document.body.getAttribute('data-theme') === 'light') {
                document.body.removeAttribute('data-theme');
            } else {
                document.body.setAttribute('data-theme', 'light');
            }
        }
    </script>
</body>
</html>
