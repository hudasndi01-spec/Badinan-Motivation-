
<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badinan Motivation</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0a192f 0%, #0f3460 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #8892b0;
            --accent-color: #64ffda;
            --accent-glow: rgba(100, 255, 218, 0.2);
        }

        .light-mode {
            --bg-gradient: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-border: rgba(0, 0, 0, 0.1);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --accent-color: #0d9488;
            --accent-glow: rgba(13, 148, 136, 0.2);
        }

        body { 
            font-family: 'Segoe UI', 'Tahoma', sans-serif; 
            background: var(--bg-gradient); 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
            transition: background 0.3s ease;
        }

        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 25px 20px; 
            border-radius: 28px; 
            border: 1px solid var(--card-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
            text-align: center; 
            max-width: 400px; 
            width: 100%; 
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .logo-area { 
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main); 
            font-size: 15px; 
            font-weight: 700;
        }

        .logo-icon {
            width: 28px;
            height: 28px;
            background: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 10px var(--accent-glow);
            color: #0a192f;
            font-weight: bold;
        }

        .theme-toggle {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 6px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
        }

        .stats-badge {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.08);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 11px;
            color: var(--accent-color);
            margin-bottom: 15px;
            border: 1px solid var(--card-border);
            font-weight: 600;
        }

        .clock-container {
            margin-bottom: 15px;
        }

        #clock { 
            font-size: 28px; 
            font-weight: 800; 
            color: var(--accent-color); 
            margin: 0;
            font-variant-numeric: tabular-nums;
        }

        #day-period {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
            font-weight: 600;
        }

        .quote-box {
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            padding: 0 5px;
        }

        p#main-text { 
            color: var(--text-main); 
            font-size: 15px; 
            line-height: 1.6; 
            margin: 0;
            font-weight: 600;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .main-btn { 
            background-color: var(--accent-color); 
            color: #0a192f; 
            border: none; 
            padding: 12px; 
            border-radius: 12px; 
            cursor: pointer; 
            flex: 2; 
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 4px 14px var(--accent-glow);
            transition: all 0.2s;
        }

        .fav-btn {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border: 1px solid var(--card-border);
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            flex: 1;
            font-size: 12px;
            font-weight: 600;
        }

        .fav-btn.active {
            background: #ff6b6b;
            color: white;
            border-color: #ff6b6b;
        }

        .notes-section {
            margin-top: 10px;
            background: rgba(0, 0, 0, 0.08);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 10px;
            text-align: right;
        }

        .footer-credits { 
            margin-top: 15px; 
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            box-sizing: border-box;
        }
        .modal-box {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 25px;
            border-radius: 24px;
            max-width: 360px;
            width: 100%;
            text-align: right;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            max-height: 85vh;
            overflow-y: auto;
        }
        .form-input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid var(--card-border);
            background: rgba(255,255,255,0.05);
            color: var(--text-main);
            font-size: 13px;
            box-sizing: border-box;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="top-bar">
            <div class="logo-area">
                <div class="logo-icon">🌙</div>
                <span>Badinan</span>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()">☀️/🌙 گۆڕینا ڕەنگی</button>
        </div>

        <div class="stats-badge">
            <span id="streak-counter">🔥 رۆژێن بەردەوام: 1 ڕۆژ</span>
            <span id="fav-counter" style="cursor: pointer; text-decoration: underline;" onclick="openFavModal()">⭐ دلخواز (0)</span>
        </div>

        <div class="clock-container">
            <div id="clock">00:00:00</div>
            <div id="day-period">بارکردن...</div>
        </div>

        <div class="quote-box">
            <p id="main-text">ئەڤرۆ ڕۆژا تە یە، پێنگاڤێ باڤێژە!</p>
        </div>

        <div class="btn-group">
            <button class="main-btn" onclick="getNewQuote()">پەیڤێن هاندەر</button>
            <button class="fav-btn" id="favToggleBtn" onclick="toggleCurrentFavorite()">⭐ لایڤ</button>
        </div>

        <!-- پشکا ئۆپشناڵ یا نامەیێن نهێنی -->
        <div class="notes-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                <h3 style="color: var(--accent-color); font-size: 13px; margin: 0;">💌 نامەیێن نهێنی</h3>
                <span style="font-size: 10px; color: var(--text-muted); cursor: pointer; text-decoration: underline;" onclick="openInboxCheck()">خاندنا نامەیێن من 📥</span>
            </div>
            <input type="text" id="sender-name" placeholder="ناڤێ تە (ژلایێ کێ؟)" class="form-input" style="margin-bottom: 6px; padding: 6px; font-size: 11px;">
            <input type="text" id="target-user" placeholder="بۆ کێ؟ (ناڤێ وەرگرکار)" class="form-input" style="margin-bottom: 6px; padding: 6px; font-size: 11px;">
            <textarea id="private-msg-text" placeholder="ناما خۆ لێرە بنڤیسە..." style="width: 100%; height: 35px; padding: 6px; border-radius: 8px; border: 1px solid var(--card-border); background: var(--card-bg); color: var(--text-main); font-size: 11px; box-sizing: border-box; resize: none; outline: none; margin-bottom: 6px;"></textarea>
            <button onclick="sendSecretMessage()" style="width: 100%; padding: 6px; font-size: 11px; background: var(--accent-color); color: #0a192f; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">هنارتنا نامەیێ</button>
        </div>

        <div class="footer-credits" style="margin-top: 10px;">
            Created by: <b>Huda Shahin sindi</b><br>
            هەمی ماف پاراستینە © 2026
        </div>
    </div>

    <!-- پەنجەرەیا دلخوازان -->
    <div id="fav-modal" class="modal-overlay" onclick="document.getElementById('fav-modal').style.display='none'">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3 style="color: var(--accent-color); margin-top: 0; font-size: 15px;">⭐ پەیڤێن دلخوازێن تە</h3>
            <div id="fav-list-container" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; max-height: 40vh; overflow-y: auto;"></div>
            <button onclick="document.getElementById('fav-modal').style.display='none'" style="width:100%; padding:8px; background:#ff6b6b; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">گرتن</button>
        </div>
    </div>

    <!-- پەنجەرەیا ڤەکرنا صندوقا نامەیان ب ناڤی -->
    <div id="inbox-modal" class="modal-overlay" onclick="document.getElementById('inbox-modal').style.display='none'">
        <div class="modal-box" onclick="event.stopPropagation()">
            <h3 style="color: var(--accent-color); margin-top: 0; font-size: 15px;">📥 نامەیێن نهێنی یێن بۆ تە هاتین</h3>
            <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 8px;">ناڤێ خۆ بنڤیسە دا نامەیێن خۆ ببینی:</div>
            <input type="text" id="check-my-name" placeholder="ناڤێ تە (بۆ نموونە: Huda)" class="form-input" style="margin-bottom: 8px;">
            <button onclick="loadMyMessages()" style="width:100%; padding:6px; background:var(--accent-color); color:#0a192f; border:none; border-radius:6px; font-weight:bold; cursor:pointer; margin-bottom: 10px;">نیشاندانا نامەیان</button>
            
            <div id="inbox-list-container" style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; max-height: 30vh; overflow-y: auto;"></div>
            <button onclick="document.getElementById('inbox-modal').style.display='none'" style="width:100%; padding:8px; background:rgba(255,255,255,0.1); color:var(--text-main); border:1px solid var(--card-border); border-radius:8px; font-weight:bold; cursor:pointer;">گرتن</button>
        </div>
    </div>

    <script>
        function sendSecretMessage() {
            let sender = document.getElementById('sender-name').value.trim();
            let target = document.getElementById('target-user').value.trim();
            let msg = document.getElementById('private-msg-text').value.trim();
            
            if(!sender || !target || !msg) {
                alert("هیڤیە ناڤێ خۆ، ناڤێ وەرگری و نامێ پڕ بکە!");
                return;
            }

            let allMessages = JSON.parse(localStorage.getItem('badinan_secret_messages') || '[]');
            allMessages.push({
                to: target.toLowerCase(),
                from: sender,
                text: msg,
                date: new Date().toLocaleDateString()
            });
            localStorage.setItem('badinan_secret_messages', JSON.stringify(allMessages));
            
            document.getElementById('target-user').value = '';
            document.getElementById('private-msg-text').value = '';
            alert("✨ ناما تە ب سەرکەفتن بۆ (" + target + ") هاتە هنارتن!");
        }

        function openInboxCheck() {
            document.getElementById('inbox-modal').style.display = 'flex';
        }

        function loadMyMessages() {
            let myName = document.getElementById('check-my-name').value.trim().toLowerCase();
            let container = document.getElementById('inbox-list-container');
            container.innerHTML = '';
            
            if(!myName) {
                alert("هیڤیە ناڤێ خۆ بنڤیسە!");
                return;
            }

            let allMessages = JSON.parse(localStorage.getItem('badinan_secret_messages') || '[]');
            let myMessages = allMessages.filter(m => m.to === myName);
            
            if(myMessages.length === 0) {
                container.innerHTML = '<p style="font-size: 12px; color: var(--text-muted); text-align: center;">هێشتا چ نامە بۆ ڤی ناڤی نەهاتینە!</p>';
            } else {
                myMessages.forEach((m) => {
                    let div = document.createElement('div');
                    div.style.background = 'rgba(255,255,255,0.05)';
                    div.style.padding = '8px';
                    div.style.borderRadius = '8px';
                    div.style.fontSize = '12px';
                    div.style.color = 'var(--text-main)';
                    div.innerHTML = `<b style="color: var(--accent-color);">ژلایێ: ${m.from}</b> <span style="font-size:10px; color:var(--text-muted);">(${m.date})</span><p style="margin: 4px 0 0 0;">${m.text}</p>`;
                    container.appendChild(div);
                });
            }
        }

        // گۆڕینا ڕەنگی (Dark / Light Mode)
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            let isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('badinan_theme', isLight ? 'light' : 'dark');
        }
        if (localStorage.getItem('badinan_theme') === 'light') {
            document.body.classList.add('light-mode');
        }

        // کاتژمێر
        function updateClock() {
            const now = new Date();
            const hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${String(hours).padStart(2, '0')}:${minutes}:${seconds}`;
            
            let period = "";
            if (hours >= 5 && hours < 12) period = "🌅 دەمێ سپێدەهیێ یە";
            else if (hours >= 12 && hours < 16) period = "☀️ دەمێ نیڤڕۆیە";
            else if (hours >= 16 && hours < 19) period = "🌇 دەمێ ئێڤاری یە";
            else period = "🌙 دەمێ شەڤێ یە";
            document.getElementById('day-period').textContent = period;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ڕۆژێن بەردەوام (Streak)
        function checkStreak() {
            let lastVisit = localStorage.getItem('badinan_last_visit');
            let streak = parseInt(localStorage.getItem('badinan_streak') || '1');
            let today = new Date().toDateString();

            if (lastVisit !== today) {
                if (lastVisit) {
                    let lastDate = new Date(lastVisit);
                    let currentDate = new Date(today);
                    let diffDays = Math.ceil(Math.abs(currentDate - lastDate) / (1000 * 60 * 60 * 24));
                    if (diffDays === 1) streak += 1;
                    else if (diffDays > 1) streak = 1;
                }
                localStorage.setItem('badinan_last_visit', today);
                localStorage.setItem('badinan_streak', streak);
            }
            document.getElementById('streak-counter').textContent = `🔥 رۆژێن بەردەوام: ${streak} ڕۆژ`;
        }
        checkStreak();

        const quotes = [
            "ئەڤرۆ ڕۆژا تە یە، پێنگاڤێ باڤێژە!",
            "تو گەلەک ژ هندێ ب هێزتری تو دەستا ب داهێلی.",
            "بخۆ بژی، نە بۆ ڕازیکرنا خەڵکی.",
            "هەر نوکە دەست پێ بکە، چ جاران درەنگ نینە.",
            "تو یا ب هێزی، باوەریێ ب شیانێن خۆ بینە.",
            "تشتێ هەر گرنگ ل ڤێ جیهانێ، ئارامیا مێشکێ تە یە؛ هەر تشتێ وی تێک بدەت، ژێ دوور بکەڤە.",
            "کەسێن نەرێنی تنێ دڤێن هێزا تە ببڕن؛ نەهێلە ئارامیا ڕۆژا تە تێک بدەن.",
            "تو نە مەجبووری کەسەکێ ژ خۆ ڕازیکەی، گرنگ ئەوە تو ژ خۆ ڕازی بی و ئەڤە بەسە."
        ];

        let currentQuote = quotes[0];

        function getNewQuote() {
            currentQuote = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('main-text').textContent = currentQuote;
            updateFavButtonState();
        }

        function getFavorites() {
            return JSON.parse(localStorage.getItem('badinan_favorites') || '[]');
        }

        function toggleCurrentFavorite() {
            let favs = getFavorites();
            let index = favs.indexOf(currentQuote);
            if (index > -1) favs.splice(index, 1);
            else favs.push(currentQuote);
            localStorage.setItem('badinan_favorites', JSON.stringify(favs));
            updateFavButtonState();
            updateFavCounter();
        }

        function updateFavButtonState() {
            let btn = document.getElementById('favToggleBtn');
            if (getFavorites().includes(currentQuote)) {
                btn.classList.add('active');
                btn.textContent = '❤️ دلخوازە';
            } else {
                btn.classList.remove('active');
                btn.textContent = '⭐ لایڤ';
            }
        }

        function updateFavCounter() {
            document.getElementById('fav-counter').textContent = `⭐ دلخواز (${getFavorites().length})`;
        }
        updateFavCounter();
        updateFavButtonState();

        function openFavModal() {
            let favs = getFavorites();
            let container = document.getElementById('fav-list-container');
            container.innerHTML = '';
            if (favs.length === 0) {
                container.innerHTML = '<p style="font-size: 12px; color: var(--text-muted); text-align: center;">هێشتا چ پەیڤ نینن د دلخوازێن تە دا!</p>';
            } else {
                favs.forEach((fav, i) => {
                    let div = document.createElement('div');
                    div.style.background = 'rgba(255,255,255,0.05)';
                    div.style.padding = '8px';
                    div.style.borderRadius = '8px';
                    div.style.fontSize = '12px';
                    div.style.color = 'var(--text-main)';
                    div.style.cursor = 'pointer';
                    div.textContent = `${i+1}. ${fav}`;
                    div.onclick = () => {
                        currentQuote = fav;
                        document.getElementById('main-text').textContent = currentQuote;
                        updateFavButtonState();
                        document.getElementById('fav-modal').style.display = 'none';
                    };
                    container.appendChild(div);
                });
            }
            document.getElementById('fav-modal').style.display = 'flex';
        }
    </script>
</body>
</html>
